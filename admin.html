<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match & Meal - Админ Панел</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container { max-width: 1000px; margin: 60px auto; padding: 20px; }
        .admin-card { background: var(--card-bg); padding: 30px; border-radius: 16px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .admin-form input, .admin-form textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-family: 'Nunito', sans-serif; background: var(--bg-color); color: var(--text-dark); }
        
        /* НОВИ СТИЛОВЕ ЗА ФОРМАТА */
        .admin-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .item-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto;}
        .item-row { display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .btn-danger { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn-danger:hover { opacity: 0.8; }
        
        #auth-status { text-align: center; margin-top: 150px; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body class="app-body">
    <nav class="navbar app-navbar">
        <div class="container nav-container">
            <a href="main.html" class="logo"> <i class="bx bx-dish"></i> Админ Панел </a>
            <div class="nav-links">
                <button id="logout-btn" class="btn-secondary" style="display: none;">Изход</button>
            </div>
        </div>
    </nav>

    <div id="auth-status">
        <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary-green); margin-bottom: 10px;"></i>
        <p>Проверка на администраторски права...</p>
    </div>

    <div class="admin-container" id="admin-content" style="display: none;">
        <h2 style="margin-bottom: 30px;">Управление на съдържанието</h2>
        
        <div class="admin-card">
            <h3 style="margin-bottom: 15px;"><i class="fa-solid fa-basket-shopping"></i> Съставки</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="new-ingredient" placeholder="Име на съставката (напр. Яйца)" style="padding:12px; border-radius:8px; border:1px solid var(--border-color); width:100%;">
                <button id="add-ingredient-btn" class="btn-primary" style="white-space: nowrap;">Добави съставка</button>
            </div>
            <div class="item-list" id="ingredients-list"></div>
        </div>

        <div class="admin-card admin-form">
            <h3 style="margin-bottom: 20px;"><i class="fa-solid fa-utensils"></i> Добави Нова Рецепта</h3>
            
            <div class="admin-form-grid">
                <input type="text" id="r-title" class="full-width" placeholder="Заглавие на рецептата">
                <input type="text" id="r-desc" class="full-width" placeholder="Кратко описание">
                <input type="text" id="r-img" class="full-width" placeholder="URL на снимка (напр. от Unsplash)">
                
                <input type="text" id="r-time" placeholder="Време (напр. 25 мин)">
                <input type="text" id="r-cal" placeholder="Калории (напр. 450 kcal)">
                <input type="text" id="r-pro" placeholder="Протеин (напр. 32г)">
                <input type="text" id="r-benefits" placeholder="Тагове: Веган, Без глутен...">
                
                <textarea id="r-ingredients" class="full-width" rows="3" placeholder="Съставки (разделени със запетая: Яйца, Сирене, Масло)"></textarea>
                <textarea id="r-steps" class="full-width" rows="3" placeholder="Стъпки (разделени със запетая: Счупи яйцата, Изпържи ги)"></textarea>
            </div>
                <div class="admin-card">
                        <h3 style="margin-bottom: 20px;">
                            <i class="fa-solid fa-users"></i> Управление на потребители
                        </h3>
                        <div id="users-list" class="item-list">
                            <p>Зареждане на списъка...</p>
                </div>
            </div>
                <div id="edit-user-modal" class="modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px);">
                    <div class="modal-content" style="background-color: var(--card-bg); margin: 10% auto; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; position: relative;">
                        <span class="close-modal" onclick="document.getElementById('edit-user-modal').style.display='none'" style="position: absolute; right: 20px; top: 15px; cursor: pointer; font-size: 1.5rem; color: var(--text-dark);">&times;</span>
                        <h3 style="margin-bottom: 20px;"><i class="fa-solid fa-user-pen"></i> Редактирай Потребител</h3>
                        
                        <input type="hidden" id="edit-user-id">
                        
                        <div style="margin-bottom: 15px;">
                            <label style="font-weight: 600; color: var(--text-dark); font-size: 0.9rem;">Име / Потребител</label>
                            <input type="text" id="edit-user-name" style="width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-dark);">
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label style="font-weight: 600; color: var(--text-dark); font-size: 0.9rem;">Имейл (само за преглед)</label>
                            <input type="email" id="edit-user-email" readonly style="width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--border-color); background: #eee; color: #888; cursor: not-allowed;" title="Имейлът се управлява от Firebase Auth и не може да се променя тук.">
                        </div>
                        
                        <button class="btn-primary" id="save-user-btn" style="width: 100%;">Запази промените</button>
                    </div>
                </div>
            
            <button id="add-recipe-btn" class="btn-primary" style="width: 100%;">Добави Рецепта в Базата</button>

            <h3 style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 20px;">Всички рецепти</h3>
            <div class="item-list" id="recipes-list"></div>
        </div>
        
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
