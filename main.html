<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match & Meal - Приложение</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="app.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="app-body">
    <nav class="navbar app-navbar">
        <div class="container nav-container">
            <a href="home.html" class="logo"> <i class="bx bx-dish"></i> Match & Meal </a>
            
            <div class="app-tabs">
                <button class="tab-btn active" onclick="switchView('recipes-view')"><i class="fa-solid fa-utensils"></i> Рецепти</button>
                <button class="tab-btn" onclick="switchView('planner-view')"><i class="fa-regular fa-calendar-days"></i> Планьор</button>
            </div>

            <div class="nav-links">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Ivan+Ivanov&background=3A8028&color=fff" alt="User">
                    <span class="user-name-desktop">Иван Иванов</span>
                    <button class="settings-btn" title="Настройки"><i class="fa-solid fa-gear"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div id="recipes-view" class="app-view active-view">
        <div class="app-layout">
            
            <aside class="sidebar compact-sidebar">
                <div class="sidebar-header">
                    <h3><i class="fa-solid fa-basket-shopping"></i> Твоят килер</h3>
                    <p class="sidebar-sub">Маркирай какво имаш</p>
                </div>

                <div class="sidebar-search">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" placeholder="Търси съставки..." id="ingredient-search">
                </div>
                
                <div class="compact-ingredient-list" id="sidebar-ingredients">
                    </div>
            </aside>

            <main class="main-content">
                <div class="top-controls-bar">
                    <div class="results-header-text">
                        <h2>Предложени рецепти</h2>
                        <span id="match-count">Избери продукти</span>
                    </div>

                    <div class="filter-wrapper" id="filter-wrapper">
                        <button class="btn-secondary filter-toggle" onclick="toggleFilterMenu(event)">
                            <i class="fa-solid fa-sliders"></i> Филтри <i class="fa-solid fa-chevron-down drop-icon"></i>
                        </button>
                        <div class="filter-dropdown" id="filter-dropdown">
                            <label><input type="checkbox"> Вегетарианско</label>
                            <label><input type="checkbox"> Веган</label>
                            <label><input type="checkbox"> Без глутен</label>
                            <label><input type="checkbox"> Високо протеиново</label>
                        </div>
                    </div>
                </div>

                <div class="recipe-grid" id="recipe-grid-container">
                    </div>
            </main>
        </div>
    </div>

    <div id="planner-view" class="app-view">
        <div class="container planner-container">
            <div class="planner-header">
                <h2><i class="fa-regular fa-calendar-days"></i> Седмично меню</h2>
                <p>Планирай храненията си за седмицата. Кликни върху плюсчето, за да добавиш любима рецепта.</p>
            </div>
            <div class="days-scroll-container">
                <div id="calendar-grid" class="calendar-grid">
                    </div>
            </div>
        </div>
    </div>

    <div id="recipe-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body" id="modal-body-content">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
